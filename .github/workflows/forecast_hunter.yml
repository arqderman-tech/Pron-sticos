name: Forecast MultiModel Hunter

on:
  schedule:
    - cron: '0 */3 * * *' # Se ejecuta cada 3 horas (00, 03, 06, 09... UTC)
  workflow_dispatch: # Permite que lo ejecutes manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Ejecutar Scraper
        run: python get_forecasts.py

      - name: Guardar en CSV y subir al repo
        run: |
          # Configuración de identidad del bot
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Aseguramos que la carpeta exista para evitar errores de pathspec
          mkdir -p forecasts
          
          # Intentamos agregar todos los CSV generados
          git add forecasts/*.csv || echo "No se encontraron archivos CSV nuevos."
          
          # Verificamos si hay cambios reales antes de hacer el commit
          if git diff --staged --quiet; then
            echo "Sin cambios detectados en los pronósticos."
          else
            git commit -m "Actualización automática pronósticos: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
          
